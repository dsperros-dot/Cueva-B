<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueva B - POS + Inventario</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #00ff88; --warn: #ffcc00; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        
        /* Pantallas */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        #main-app { display: none; padding-bottom: 50px; }
        .main-layout { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 1200px; margin: auto; }
        
        /* Botonera */
        .menu-section { flex: 1; min-width: 320px; max-width: 800px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(115px, 1fr)); gap: 10px; }
        .btn-prod { padding: 10px 5px; font-size: 13px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; position: relative; }
        .stock-badge { background: rgba(0,0,0,0.6); color: white; padding: 2px 6px; border-radius: 5px; font-size: 10px; margin-top: 5px; }
        .btn-prod:disabled { background-color: #444 !important; color: #888 !important; cursor: not-allowed; opacity: 0.6; }

        /* Panel Admin e Inventario */
        #admin-panel { display: none; margin-top: 20px; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--accent); text-align: left; }
        .inventario-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .inventario-table th, .inventario-table td { border: 1px solid #333; padding: 8px; text-align: left; }
        .input-stock { width: 50px; background: #000; color: var(--accent); border: 1px solid #555; padding: 5px; border-radius: 4px; }

        /* Ticket */
        .ticket-section { width: 280px; background: #fff; color: #000; padding: 20px; border-radius: 8px; font-family: 'Courier New', monospace; height: fit-content; position: sticky; top: 10px; }
        .total-ticket { border-top: 2px solid #000; margin-top: 15px; padding-top: 10px; font-weight: bold; font-size: 20px; text-align: right; }
        
        .btn-ui { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="letter-spacing: 3px;">CUEVA B</h1>
        <div style="background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333;">
            <button class="btn-ui" style="background: #444; color: white;" onclick="entrarComo('vendedor')">👤 Modo Vendedor</button>
            <button class="btn-ui" style="background: var(--accent); color: #000;" onclick="entrarComo('dueno')">🔑 Modo Propietario</button>
        </div>
    </div>

    <div id="main-app">
        <header style="padding: 10px; display: flex; justify-content: space-between;">
            <button onclick="cerrarSesion()" style="background:#333; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">⬅ Salir</button>
            <span id="user-info" style="color: var(--accent); font-weight: bold;"></span>
        </header>

        <div class="main-layout">
            <div class="menu-section">
                <div class="grid" id="contenedor-productos"></div>

                <div id="admin-panel">
                    <h3>📊 Gestión de Negocio</h3>
                    <p style="font-size: 24px; color: var(--accent); margin: 5px 0;">Caja: $<span id="total-caja">0</span></p>
                    
                    <details>
                        <summary style="cursor:pointer; color: var(--warn);">📦 Configurar Inventario (Stock)</summary>
                        <table class="inventario-table">
                            <thead><tr><th>Producto</th><th>Stock Actual</th><th>Nuevo</th></tr></thead>
                            <tbody id="tabla-stock-body"></tbody>
                        </table>
                        <button class="btn-ui" style="background: var(--accent); color: #000; margin-top:10px;" onclick="guardarTodoElStock()">💾 Guardar Inventario</button>
                    </details>

                    <div style="margin-top:20px;">
                        <button class="btn-ui" style="background: #2e7d32; color:white;" onclick="descargarExcel()">📥 Bajar Reporte Excel</button>
                        <button class="btn-ui" style="background: var(--danger); color:white;" onclick="realizarCorte()">📊 Hacer Corte de Caja</button>
                    </div>
                </div>
            </div>

            <div class="ticket-section" id="area-ticket">
                <h2 style="margin:0; text-align:center;">CUEVA B</h2>
                <div id="items-ticket" style="min-height: 80px; margin-top:15px;"></div>
                <div class="total-ticket">TOTAL: $<span id="total-ticket-monto">0</span></div>
                <button class="btn-ui" style="background: var(--accent); color: #000; margin-top:15px;" onclick="finalizarVenta()">✅ Cobrar</button>
                <button onclick="cancelarTicket()" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px; font-size:11px;">❌ Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const productosBase = [
            { id: 'p1', nombre: 'PresPeq',   precio: 140,  color: '#ffcc00' },
            { id: 'p2', nombre: 'OnePeq',    precio: 120,  color: '#ff00ff' },
            { id: 'p3', nombre: 'Corona',    precio: 150,  color: '#0088ff' },
            { id: 'p4', nombre: 'Smifnoff',  precio: 200,  color: '#f0f0f0' },
            { id: 'p5', nombre: 'Modelo',    precio: 200,  color: '#ff4400' },
            { id: 'p6', nombre: 'PresMed',   precio: 200,  color: '#00ff88' },
            { id: 'p7', nombre: 'PresJum',   precio: 230,  color: '#9933ff' },
            { id: 'p8', nombre: 'Agua',      precio: 15,   color: '#f0f0f0' },
            { id: 'p9', nombre: 'Soda',      precio: 50,   color: '#ff4400' },
            { id: 'p10', nombre: '7up',      precio: 30,   color: '#00ff88' }
        ];

        const PIN_DUENO = "020322";
        let ticketActual = [];
        let stockLocal = {};
        let rolActual = "";

        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCbkHawWcvju2U-ehpvHkToQV0--qh6Ip0",
            authDomain: "mibarpos.firebaseapp.com",
            databaseURL: "https://mibarpos-default-rtdb.firebaseio.com",
            projectId: "mibarpos",
            appId: "1:492727911130:web:58bea15998a09420a39be3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function entrarComo(rol) {
            if(rol === 'dueno' && prompt("PIN Propietario:") !== PIN_DUENO) return alert("Error");
            rolActual = rol;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('admin-panel').style.display = rol === 'dueno' ? 'block' : 'none';
            document.getElementById('user-info').innerText = rol === 'dueno' ? "PROPIETARIO" : "VENDEDOR";
            renderizarTodo();
        }

        function cerrarSesion() { location.reload(); }

        // SINCRONIZACIÓN DE STOCK Y VENTAS
        db.ref('inventario').on('value', (snap) => {
            stockLocal = snap.val() || {};
            renderizarTodo();
        });

        db.ref('ventas').on('value', (snap) => {
            let total = 0;
            if(snap.val()) Object.values(snap.val()).forEach(v => total += v.precio);
            document.getElementById('total-caja').innerText = total;
        });

        function renderizarTodo() {
            const grid = document.getElementById('contenedor-productos');
            const tabla = document.getElementById('tabla-stock-body');
            grid.innerHTML = ""; tabla.innerHTML = "";

            productosBase.forEach(p => {
                const stock = stockLocal[p.id] || 0;
                
                // Botón de Venta
                const btn = document.createElement('button');
                btn.className = 'btn-prod';
                btn.style.backgroundColor = p.color;
                if(['#f0f0f0', '#ffcc00', '#00ff88'].includes(p.color)) btn.style.color = '#333';
                if(stock <= 0) btn.disabled = true;
                if(stock > 0 && stock <= 5) btn.style.boxShadow = "0 0 10px #ffcc00";

                btn.innerHTML = `<b>${p.nombre}</b>$${p.precio}<span class="stock-badge">Stock: ${stock}</span>`;
                btn.onclick = () => {
                    if(stock > 0) {
                        ticketActual.push(p);
                        renderizarTicket();
                    }
                };
                grid.appendChild(btn);

                // Fila de Inventario (Solo Dueño)
                if(rolActual === 'dueno') {
                    tabla.innerHTML += `<tr><td>${p.nombre}</td><td>${stock}</td>
                        <td><input type="number" class="input-stock" id="in-${p.id}" placeholder="+/-"></td></tr>`;
                }
            });
        }

        function guardarTodoElStock() {
            productosBase.forEach(p => {
                const input = document.getElementById(`in-${p.id}`);
                if(input.value) {
                    const nuevoValor = (stockLocal[p.id] || 0) + parseInt(input.value);
                    db.ref(`inventario/${p.id}`).set(nuevoValor);
                }
            });
            alert("Inventario Actualizado");
        }

        function renderizarTicket() {
            const container = document.getElementById('items-ticket');
            let html = ""; let total = 0;
            ticketActual.forEach(item => {
                total += item.precio;
                html += `<div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;"><span>${item.nombre}</span><span>$${item.precio}</span></div>`;
            });
            container.innerHTML = html || '<p style="color:#888; font-size: 12px; text-align:center;">Esperando pedido...</p>';
            document.getElementById('total-ticket-monto').innerText = total;
        }

        function finalizarVenta() {
            if(ticketActual.length === 0) return;
            const total = Number(document.getElementById('total-ticket-monto').innerText);
            
            // 1. Restar del Stock
            ticketActual.forEach(p => {
                const stockActual = stockLocal[p.id] || 0;
                db.ref(`inventario/${p.id}`).set(stockActual - 1);
            });

            // 2. Guardar Venta
            db.ref('ventas').push({
                productos: ticketActual.map(p => p.nombre).join(", "),
                precio: total,
                fecha: new Date().toLocaleString()
            });

            window.print();
            ticketActual = [];
            renderizarTicket();
        }

        function cancelarTicket() { ticketActual = []; renderizarTicket(); }
        function realizarCorte() { if(confirm("¿Limpiar caja?")) db.ref('ventas').remove(); }
    </script>
</body>
</html>
