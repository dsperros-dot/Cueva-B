<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueva B - Gestión Fácil</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; max-width: 800px; margin: auto; }
        button { padding: 25px 10px; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; transition: 0.1s; }
        button:active { transform: scale(0.95); }

        /* Estilo general de los botones si no tienen color definido */
        .btn-generico { background: #444; }

        #admin { margin: 25px auto; background: var(--card); padding: 20px; border-radius: 20px; max-width: 500px; border: 1px solid #333; }
        .total-box { color: #00ff88; font-size: 32px; font-weight: bold; margin: 10px 0; }
        .historial-box { max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; text-align: left; font-size: 14px; }
        .log { padding: 8px 0; border-bottom: 1px solid #222; color: #bbb; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-undo { background: #555; padding: 15px; grid-column: span 2; }
        .btn-excel { background: #2e7d32; padding: 15px; }
        .btn-corte { background: #b30000; padding: 15px; }
    </style>
</head>
<body>

    <h1>🍻 Cueva B - Ventas</h1>
    <div class="grid" id="contenedor-productos"></div>

    <div id="admin">
        <div class="total-box">$<span id="total-caja">0</span></div>
        <div class="historial-box" id="historial">Cargando...</div>
        <div class="actions">
            <button class="btn-undo" onclick="deshacerVenta()">↩️ Deshacer Última</button>
            <button class="btn-excel" onclick="descargarExcel()">📥 Bajar Excel</button>
            <button class="btn-corte" onclick="realizarCorte()">📊 Corte (PIN)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ==========================================
        // 🛒 CATÁLOGO DE PRODUCTOS (Modifica aquí)
        // = { nombre: 'NOMBRE', precio: PRECIO, color: 'COLOR' }
        // ==========================================
        const productos = [
            { nombre: 'PresPeq',   precio: 140,  color: '#ffcc00' },
            { nombre: 'OnePeq',    precio: 120,  color: '#ff00ff' },
            { nombre: 'Corona',    precio: 150,  color: '#0088ff' },
            { nombre: 'smifnoff',  precio: 200,  color: '#f0f0f0' },
            { nombre: 'modelo',    precio: 200,  color: '#ff4400' },
            { nombre: 'PresMed',   precio: 200,  color: '#00ff88' },
            { nombre: 'PresJum',   precio: 230,  color: '#9933ff' },
            { nombre: 'BruExtV1',  precio: 750,  color: '#ffcc00' },
            { nombre: 'BruXV1Lt',  precio: 850,  color: '#ff00ff' },
            { nombre: 'BruDRes1',  precio: 1200, color: '#0088ff' },
            { nombre: 'KPridPeq',  precio: 175,  color: '#f0f0f0' },
            { nombre: 'KPridMed',  precio: 225,  color: '#ff4400' },
            { nombre: 'KPridGde',  precio: 350,  color: '#00ff88' },
            { nombre: 'VinoF1Lt',  precio: 1200, color: '#9933ff' },
            { nombre: 'JugMotts',  precio: 220,  color: '#ff00ff' },
            { nombre: '911',       precio: 50,   color: '#0088ff' },
            { nombre: 'Agua',      precio: 15,   color: '#f0f0f0' },
            { nombre: 'Soda',      precio: 50,   color: '#ff4400' },
            { nombre: '7up',       precio: 30,   color: '#00ff88' },
            { nombre: 'GatorPeq',  precio: 50,   color: '#9933ff' },
            { nombre: 'Corona',    precio: 000,  color: '#0088ff' },
            { nombre: 'Agua',      precio: 00,   color: '#f0f0f0' },
            { nombre: 'Shot',      precio: 00,   color: '#ff4400' },
            { nombre: 'Margarita', precio: 000,  color: '#00ff88' },
            { nombre: 'Botella',   precio: 0000, color: '#9933ff' },
            // Puedes agregar más abajo respetando las comas y llaves
        ];

        const PIN_CORRECTO = "020322"; 

        // ==========================================
        // NO TOCAR NADA DE AQUÍ ABAJO (Lógica)
        // ==========================================
        
        const grid = document.getElementById('contenedor-productos');
        productos.forEach(p => {
            const btn = document.createElement('button');
            btn.style.backgroundColor = p.color;
            // Si el color es claro (como el agua), ponemos texto oscuro
            if(p.color === '#f0f0f0' || p.color === '#ffcc00' || p.color === '#00ff88') btn.style.color = '#333';
            
            btn.innerText = `${p.nombre}\n$${p.precio}`;
            btn.onclick = () => enviarVenta(p.nombre, p.precio);
            grid.appendChild(btn);
        });

        const firebaseConfig = {
            apiKey: "AIzaSyCbkHawWcvju2U-ehpvHkToQV0--qh6Ip0",
            authDomain: "mibarpos.firebaseapp.com",
            databaseURL: "https://mibarpos-default-rtdb.firebaseio.com",
            projectId: "mibarpos",
            appId: "1:492727911130:web:58bea15998a09420a39be3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ventasActuales = [];

        function enviarVenta(producto, precio) {
            db.ref('ventas').push({
                producto: producto,
                precio: precio,
                hora: new Date().toLocaleTimeString('es-MX'),
                fecha_completa: new Date().toLocaleDateString('es-MX')
            });
        }

        function descargarExcel() {
            if (ventasActuales.length === 0) return alert("No hay ventas");
            const ws = XLSX.utils.json_to_sheet(ventasActuales);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ventas");
            XLSX.writeFile(wb, `Ventas_CuevaB_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
        }

        function deshacerVenta() {
            db.ref('ventas').limitToLast(1).once('value', (s) => {
                s.forEach((c) => { if(confirm(`¿Borrar ${c.val().producto}?`)) c.ref.remove(); });
            });
        }

        function realizarCorte() {
            if (prompt("PIN:") === PIN_CORRECTO) {
                if(confirm("¿Limpiar caja?")) db.ref('ventas').remove();
            } else { alert("PIN Incorrecto"); }
        }

        db.ref('ventas').on('value', (snapshot) => {
            const datos = snapshot.val();
            let total = 0, html = "";
            ventasActuales = [];
            if (datos) {
                Object.values(datos).reverse().forEach(v => {
                    total += v.precio;
                    ventasActuales.push(v);
                    html += `<div class="log">${v.hora} - <b>${v.producto}</b>: $${v.precio}</div>`;
                });
                document.getElementById('total-caja').innerText = total;
                document.getElementById('historial').innerHTML = html;
            } else {
                document.getElementById('total-caja').innerText = "0";
                document.getElementById('historial').innerHTML = "Sin ventas";
            }
        });
    </script>
</body>
</html>
