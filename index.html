<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueva B - Punto de Venta</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        .main-layout { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 1200px; margin: auto; }
        .menu-section { flex: 1; min-width: 320px; max-width: 800px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
        .btn-prod { padding: 15px 5px; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.1s; height: 70px; }
        .ticket-section { width: 300px; background: #fff; color: #000; padding: 20px; border-radius: 8px; font-family: 'Courier New', monospace; box-shadow: 0 10px 25px rgba(0,0,0,0.5); height: fit-content; position: sticky; top: 10px; }
        .ticket-header { border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .ticket-line { display: flex; justify-content: space-between; font-size: 14px; margin: 5px 0; }
        .total-ticket { border-top: 2px solid #000; margin-top: 15px; padding-top: 10px; font-weight: bold; font-size: 20px; text-align: right; }
        .btn-pay { background: var(--accent); color: #000; width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #admin { margin-top: 20px; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .total-box { color: var(--accent); font-size: 26px; font-weight: bold; }
        .historial-box { max-height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; text-align: left; font-size: 12px; margin: 10px 0; }
        .log { padding: 5px 0; border-bottom: 1px solid #222; color: #aaa; }
        @media print { body * { visibility: hidden; } .ticket-section, .ticket-section * { visibility: visible; } .ticket-section { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; } .btn-pay, [onclick="cancelarTicket()"] { display: none; } }
    </style>
</head>
<body>

    <h2 style="margin: 10px 0;">🍺 Cueva B - POS</h2>

    <div class="main-layout">
        <div class="menu-section">
            <div class="grid" id="contenedor-productos"></div>
            <div id="admin">
                <div class="total-box">Caja Total: $<span id="total-caja">0</span></div>
                <button onclick="deshacerVenta()" style="background:#666; color:white; border:none; padding:8px; border-radius:8px; width:100%; margin:10px 0; cursor:pointer;">↩️ Deshacer Última Factura</button>
                <div class="historial-box" id="historial">Cargando...</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button onclick="descargarExcel()" style="background:#444; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">📥 Excel</button>
                    <button onclick="realizarCorte()" style="background:#b30000; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">📊 Corte (PIN)</button>
                </div>
            </div>
        </div>

        <div class="ticket-section" id="area-ticket">
            <div class="ticket-header">
                <h1 style="margin:0;">CUEVA B</h1>
                <small id="fecha-ticket"></small>
            </div>
            <div id="items-ticket"><p style="color:#888; font-size: 12px;">Esperando pedido...</p></div>
            <div class="total-ticket">TOTAL: $<span id="total-ticket-monto">0</span></div>
            <button class="btn-pay" onclick="finalizarVenta()">✅ Cobrar e Imprimir</button>
            <button onclick="cancelarTicket()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">❌ Cancelar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const productos = [
            { nombre: 'PresPeq',   precio: 140,  color: '#ffcc00' },
            { nombre: 'OnePeq',    precio: 120,  color: '#ff00ff' },
            { nombre: 'Corona',    precio: 150,  color: '#0088ff' },
            { nombre: 'smifnoff',  precio: 200,  color: '#f0f0f0' },
            { nombre: 'modelo',    precio: 200,  color: '#ff4400' },
            { nombre: 'PresMed',   precio: 200,  color: '#00ff88' },
            { nombre: 'PresJum',   precio: 230,  color: '#9933ff' },
            { nombre: 'BruExtV1',  precio: 750,  color: '#ffcc00' },
            { nombre: 'BruXV1Lt',  precio: 850,  color: '#ff00ff' },
            { nombre: 'BruDRes1',  precio: 1200, color: '#0088ff' },
            { nombre: 'KPridPeq',  precio: 175,  color: '#f0f0f0' },
            { nombre: 'KPridMed',  precio: 225,  color: '#ff4400' },
            { nombre: 'KPridGde',  precio: 350,  color: '#00ff88' },
            { nombre: 'VinoF1Lt',  precio: 250,  color: '#9933ff' },
            { nombre: 'JugMotts',  precio: 220,  color: '#ff00ff' },
            { nombre: '911',       precio: 50,   color: '#0088ff' },
            { nombre: 'Agua',      precio: 15,   color: '#f0f0f0' },
            { nombre: 'Soda',      precio: 50,   color: '#ff4400' },
            { nombre: '7up',       precio: 30,   color: '#00ff88' },
            { nombre: 'GatorPeq',  precio: 50,   color: '#9933ff' }
            { nombre: 'CarlosRo',  precio: 500,  color: '#9933ff' }
         ];

        const PIN_CORRECTO = "020322"; 
        let ticketActual = [];
        let ventasActuales = [];

        // Generar botones
        const grid = document.getElementById('contenedor-productos');
        productos.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-prod';
            btn.style.backgroundColor = p.color;
            if(['#f0f0f0', '#ffcc00', '#00ff88'].includes(p.color)) btn.style.color = '#333';
            btn.innerText = `${p.nombre}\n$${p.precio}`;
            btn.onclick = () => {
                ticketActual.push({ nombre: p.nombre, precio: Number(p.precio) });
                renderizarTicket();
            };
            grid.appendChild(btn);
        });

        function renderizarTicket() {
            const container = document.getElementById('items-ticket');
            let html = ""; 
            let total = 0;
            
            if (ticketActual.length > 0) {
                ticketActual.forEach(item => {
                    total += item.precio;
                    html += `<div class="ticket-line"><span>${item.nombre}</span><span>$${item.precio}</span></div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p style="color:#888; font-size: 12px;">Esperando pedido...</p>';
            }
            
            document.getElementById('total-ticket-monto').innerText = total;
            document.getElementById('fecha-ticket').innerText = new Date().toLocaleString();
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCbkHawWcvju2U-ehpvHkToQV0--qh6Ip0",
            authDomain: "mibarpos.firebaseapp.com",
            databaseURL: "https://mibarpos-default-rtdb.firebaseio.com",
            projectId: "mibarpos",
            appId: "1:492727911130:web:58bea15998a09420a39be3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function finalizarVenta() {
            if(ticketActual.length === 0) return;
            const mto = Number(document.getElementById('total-ticket-monto').innerText);
            const det = ticketActual.map(p => p.nombre).join(", ");
            
            db.ref('ventas').push({
                producto: det,
                precio: mto,
                hora: new Date().toLocaleTimeString('es-MX'),
                fecha_completa: new Date().toLocaleDateString('es-MX')
            }).then(() => {
                window.print();
                ticketActual = [];
                renderizarTicket();
            });
        }

        function cancelarTicket() { ticketActual = []; renderizarTicket(); }

        function deshacerVenta() {
            db.ref('ventas').limitToLast(1).once('value', (s) => {
                s.forEach((c) => { if(confirm(`¿Borrar última venta de $${c.val().precio}?`)) c.ref.remove(); });
            });
        }

        db.ref('ventas').on('value', (snapshot) => {
            const datos = snapshot.val();
            let totalGeneral = 0;
            let htmlHistorial = "";
            ventasActuales = [];
            
            if (datos) {
                Object.values(datos).reverse().forEach(v => {
                    totalGeneral += Number(v.precio);
                    ventasActuales.push(v);
                    htmlHistorial += `<div class="log"><b>${v.hora}</b> - $${v.precio}: <small>${v.producto}</small></div>`;
                });
                document.getElementById('total-caja').innerText = totalGeneral;
                document.getElementById('historial').innerHTML = htmlHistorial;
            } else {
                document.getElementById('total-caja').innerText = "0";
                document.getElementById('historial').innerHTML = "Sin ventas";
            }
        });

        function descargarExcel() {
            if (ventasActuales.length === 0) return alert("No hay datos");
            const ws = XLSX.utils.json_to_sheet(ventasActuales);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ventas");
            XLSX.writeFile(wb, `CuevaB_${new Date().toLocaleDateString()}.xlsx`);
        }

        function realizarCorte() {
            if (prompt("PIN:") === PIN_CORRECTO) {
                if(confirm("¿Limpiar caja?")) db.ref('ventas').remove();
            } else { alert("PIN Incorrecto"); }
        }
    </script>
</body>
</html>
